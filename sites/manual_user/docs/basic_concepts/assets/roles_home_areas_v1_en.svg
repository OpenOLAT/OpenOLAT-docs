<svg viewBox="0 0 940 400" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#135E5F"/>
    </marker>
  </defs>

  <text x="470" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#135E5F">Main navigation, composed according to role</text>

  <!-- Menu row -->
  <g font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    <rect x="20"  y="48" width="172" height="52" rx="6" fill="#209D9E"/>
    <text x="106" y="79">Courses</text>
    <rect x="207" y="48" width="172" height="52" rx="6" fill="#209D9E"/>
    <text x="293" y="79">Coaching</text>
    <rect x="394" y="48" width="172" height="52" rx="6" fill="#209D9E"/>
    <text x="480" y="79">Authoring area</text>
    <rect x="581" y="48" width="172" height="52" rx="6" fill="#209D9E"/>
    <text x="667" y="79">Course Planner</text>
    <rect x="768" y="48" width="172" height="52" rx="6" fill="#209D9E"/>
    <text x="854" y="79">Administration</text>
  </g>

  <!-- Arrows -->
  <g stroke="#135E5F" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="106" y1="270" x2="106" y2="112"/>
    <line x1="293" y1="270" x2="293" y2="112"/>
    <line x1="480" y1="270" x2="480" y2="112"/>
    <line x1="667" y1="270" x2="667" y2="112"/>
    <line x1="854" y1="270" x2="854" y2="112"/>
  </g>
  <text x="470" y="200" text-anchor="middle" font-size="14" fill="#A6A6A6">works in</text>

  <!-- Persona row -->
  <g text-anchor="middle">
    <rect x="20"  y="272" width="172" height="76" rx="6" fill="#FFFFFF" stroke="#A6A6A6"/>
    <text x="106" y="303" font-size="15" font-weight="bold" fill="#2D2926">Learners</text>
    <text x="106" y="326" font-size="13" fill="#2D2926">Participant</text>

    <rect x="207" y="272" width="172" height="76" rx="6" fill="#FFFFFF" stroke="#A6A6A6"/>
    <text x="293" y="303" font-size="15" font-weight="bold" fill="#2D2926">Coaches</text>
    <text x="293" y="326" font-size="13" fill="#2D2926">Coach, owner</text>

    <rect x="394" y="272" width="172" height="76" rx="6" fill="#FFFFFF" stroke="#A6A6A6"/>
    <text x="480" y="303" font-size="14" font-weight="bold" fill="#2D2926">Course creators</text>
    <text x="480" y="326" font-size="13" fill="#2D2926">Author</text>

    <rect x="581" y="272" width="172" height="76" rx="6" fill="#FFFFFF" stroke="#A6A6A6"/>
    <text x="667" y="303" font-size="15" font-weight="bold" fill="#2D2926">Course planners</text>
    <text x="667" y="326" font-size="13" fill="#2D2926">Course planner</text>

    <rect x="768" y="272" width="172" height="76" rx="6" fill="#FFFFFF" stroke="#A6A6A6"/>
    <text x="854" y="303" font-size="13" font-weight="bold" fill="#2D2926">System managers</text>
    <text x="854" y="326" font-size="13" fill="#2D2926">System administrator</text>
  </g>

  <text x="470" y="384" text-anchor="middle" font-size="13" fill="#A6A6A6">Example: core areas. Which menu items are visible depends on roles and activated modules.</text>
</svg>
